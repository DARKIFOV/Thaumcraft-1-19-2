displayName="Thaumcraft Legacy Rebuild"
authors="DARKIFOV"
description='''
Forge 1.19.2 source-driven parity port of original Thaumcraft 4.2.3.5.
v11.62.49 corrects the Aspect Orb lifetime scale to the original floating-point operator order, preserves the exact +120 raw lightmap boost, restores lava motion/fizz behavior and keeps both the orb-local cooldown and the original player XP pickup gate.
v11.62.48 restores the original unstable aura-node stability loop and ports the
collectible Aspect Orb entity. Unstabilized unstable nodes now eject a random
primal aspect instead of converting it, node scheduling is local per tile, and
stabilizers can very rarely calm unstable or fading nodes. Aspect Orbs use the
original TC4 particle sheet and timing, seek a nearby player with hotbar wand
capacity, and transfer primal vis on pickup through a server-authoritative
Forge entity contract.
v11.62.47 restores exact occupied-slot matching for shapeless Arcane Workbench
recipes, normalizes materialized catalyst duplication, consumes hidden migration
catalysts once, and connects TC4 armor/bauble vis discounts to crafting, focus
casting, transformation actions, the Arcane Workbench GUI and wand HUD. Costs
use the original integer-truncation rule instead of rounding upward.
v11.62.46 adds semantic validation for every item-model parent/display chain,
verifies all eight Forge builtin/entity render contracts, restores TC4 lightmap
behaviour on node stabilizer overlays, uses additive blending for the stabilizer
field, and corrects the node-in-a-jar aspect/type animation and blend rules.
v11.62.45 fixes the Thaumonomicon transaction, Thaumometer readout layout,
aura-node animation precision and wand light packing. The project remains
Forge 1.19.2 / Java 17.
'''

[[dependencies.thaumcraft]]
modId="forge"
mandatory=true
versionRange="[43,)"
ordering="NONE"
side="BOTH"


