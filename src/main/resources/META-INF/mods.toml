displayName="Thaumcraft Legacy Rebuild"
authors="DARKIFOV"
description='''
Forge 1.19.2 source-driven parity port of original Thaumcraft 4.2.3.5.
v11.62.53 restores the original TC4 wand-to-node floaty drain beam, including the hand offset, crossed textured strips, width, animation speed and colour smoothing. It also clears stale drain state on release or failed transfer, removes invented drain particles, and fixes Thaumometer lighting so only the glass/readout receives the original 190..210 lightmap pulse while the body uses ambient world light.
v11.62.49 corrects the Aspect Orb lifetime scale to the original floating-point operator order, preserves the exact +120 raw lightmap boost, restores lava motion/fizz behavior and keeps both the orb-local cooldown and the original player XP pickup gate.
v11.62.48 restores the original unstable aura-node stability loop and ports the
collectible Aspect Orb entity. Unstabilized unstable nodes now eject a random
primal aspect instead of converting it, node scheduling is local per tile, and
stabilizers can very rarely calm unstable or fading nodes. Aspect Orbs use the
original TC4 particle sheet and timing, seek a nearby player with hotbar wand
capacity, and transfer primal vis on pickup through a server-authoritative
Forge entity contract.
v11.62.47 restores exact occupied-slot matching for shapeless Arcane Workbench
recipes, normalizes materialized catalyst duplication, consumes hidden migration
catalysts once, and connects TC4 armor/bauble vis discounts to crafting, focus
casting, transformation actions, the Arcane Workbench GUI and wand HUD. Costs
use the original integer-truncation rule instead of rounding upward.
v11.62.46 adds semantic validation for every item-model parent/display chain,
verifies all eight Forge builtin/entity render contracts, restores TC4 lightmap
behaviour on node stabilizer overlays, uses additive blending for the stabilizer
field, and corrects the node-in-a-jar aspect/type animation and blend rules.
v11.62.45 fixes the Thaumonomicon transaction, Thaumometer readout layout,
aura-node animation precision and wand light packing. The project remains
Forge 1.19.2 / Java 17.
v11.62.54 restores the original TC4 32x32 top-left wand vis dial (with optional bottom placement), focus/picked-block centre icon, cooldown readout, exact sneaking values and session reset. Focus cycling now follows the original TreeMap sorting/overwrite order and performs transactional swaps so a full inventory cannot eject or lose the installed focus.
v11.62.54-hotfix2 replaces renderer, menu-screen and colour-handler lambdas that target obfuscated Minecraft SAM interfaces with explicit bridge objects. This prevents AbstractMethodError during the initial client resource reload in SRG production runtime.
v11.62.54-hotfix3 aligns all GitHub regression guards with those SRG-safe adapters, accepts semantic-version hotfix suffixes, and publishes the consolidated R4 expert report. Gameplay code and assets are unchanged from hotfix2.
v11.62.54-hotfix4 adds the Alchemical Furnace container GUI and revises the Crucible, Arcane Pedestal and Arcane Workbench block models after runtime screenshot review.
v11.62.54-hotfix5 restores strict TC4 research links (identical aspects cannot connect), adjacency-gated placement, Research Expertise component hints/refunds, and Research Mastery free-placement/Shift-combine behavior.
v11.62.54-hotfix7 regenerates the complete 201-entry TC4 research graph and 591 ordered Thaumonomicon pages from the original 4.2.3.5 ConfigResearch source map, audits all research icons and book GUI assets, restores concealed-page removal and dynamic aspect pages, and recentres BEWLR wand transforms for visible first-person and inventory rendering.
'''

