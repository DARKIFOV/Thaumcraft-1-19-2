name: Build and audit

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Forge-only project
        run: python3 tools/forge_only_guard.py

      - name: Validate Java source text
        run: python3 tools/java_syntax_guard.py

      - name: Validate Forge 1.19.2 compile API usage
        run: python3 tools/forge_1192_compile_api_guard.py

      - name: Validate JSON resources
        run: python3 tools/validate_json_resources.py

      - name: Validate TC4 visual paths
        run: python3 tools/visual_parity_guard.py

      - name: Validate integrated Research Table
        run: python3 tools/research_table_guard.py

      - name: Validate Research Table opening path
        run: python3 tools/research_table_open_guard.py

      - name: Validate Magical Forest worldgen path
        run: python3 tools/worldgen_guard.py

      - name: Validate feature-cycle-safe biome generation
        run: python3 tools/feature_cycle_guard.py

      - name: Validate TC4 research links and Expertise/Mastery
        run: python3 tools/research_expertise_guard.py

      - name: Validate Thaumometer scanning path
        run: python3 tools/thaumometer_scan_guard.py

      - name: Validate screenshot-driven runtime visuals
        run: python3 tools/runtime_visual_guard.py

      - name: Validate magical leaves, wand UV and Research Table renderer
        run: python3 tools/leaves_wand_table_guard.py

      - name: Validate byte-exact original TC4 texture bank
        run: python3 tools/tc4_original_asset_guard.py

      - name: Validate TC4 runtime visual parity
        run: python3 tools/tc4_runtime_visual_guard.py

      - name: Validate legacy runtime repairs
        run: python3 tools/runtime_fix_guard.py

      - name: Audit every item model and texture chain
        run: python3 tools/tc4_item_visual_audit.py --version 11.62.91 --fail-on-missing

      - name: Audit parent chains and display transforms
        run: python3 tools/model_transform_audit.py --version 11.62.91 --fail-on-problems

      - name: Audit Forge builtin entity render contracts
        run: python3 tools/bewlr_contract_audit.py --version 11.62.91 --fail-on-problems

      - name: Audit aura node, node jar and stabilizer parity
        run: python3 tools/aura_node_parity_audit.py --version 11.62.91 --fail-on-problems

      - name: Validate v11.62.45 parity fixes
        run: python3 tools/tc4_116245_parity_guard.py

      - name: Validate v11.62.46 audit and node parity regressions
        run: python3 tools/tc4_116246_audit_guard.py

      - name: Validate v11.62.47 Arcane Workbench and wand cost regressions
        run: python3 tools/tc4_116247_arcane_wand_guard.py

      - name: Validate v11.62.48 aura-node scheduler and Aspect Orb baseline
        run: python3 tools/tc4_116248_node_orb_guard.py

      - name: Validate v11.62.49 Aspect Orb renderer and entity parity
        run: python3 tools/tc4_116249_aspect_orb_parity_guard.py

      - name: Validate v11.62.50 real-client screenshot fixes
        run: python3 tools/tc4_116250_runtime_screenshot_guard.py

      - name: Validate v11.62.51 research, scan and node-tag parity
        run: python3 tools/tc4_116251_research_scan_hud_guard.py

      - name: Validate v11.62.52 runtime-risk hardening
        run: python3 tools/tc4_116252_runtime_risk_guard.py

      - name: Validate v11.62.53 wand beam and Thaumometer lighting
        run: python3 tools/tc4_116253_wand_beam_thaumometer_guard.py

      - name: Validate v11.62.54 original wand HUD and focus cycling
        run: python3 tools/tc4_116254_focus_hud_cycle_guard.py

      - name: Validate registry and resources
        run: python3 tools/audit_registry.py --version 11.62.91 --fail-on-unexpected

      - name: Regenerate-check exact TC4 research runtime
        run: python3 tools/generate_tc4_research_runtime_from_source_map.py --check

      - name: Audit all 201 TC4 research entries and Thaumonomicon assets
        run: python3 tools/tc4_full_research_thaumonomicon_audit.py --version 11.62.91 --fail-on-problems

      - name: Validate v11.62.70 visual, texture, wand and Thaumometer baseline
        run: python3 tools/tc4_116270_visual_runtime_regression_guard.py

      - name: Validate v11.62.71 original GUI offsets and complete infusion set
        run: python3 tools/tc4_116271_original_gui_infusion_guard.py

      - name: Validate Brain in a Jar runtime parity
        run: python3 tools/tc4_116272_brain_jar_runtime_guard.py

      - name: Validate TC4 mirror runtime parity
        run: python3 tools/tc4_116273_mirror_runtime_guard.py


      - name: Audit TC4 custom visual contracts (P0)
        run: python3 tools/audit_visual_parity.py --version 11.62.91 --fail-on-p0

      - name: Validate v11.62.76 compile and evidence contracts
        run: python3 tools/tc4_116276_compile_runtime_contract_guard.py

      - name: Validate v11.62.77 Outer Lands generation and boss-lock cycle
        run: python3 tools/tc4_116277_outer_lands_cycle_guard.py

      - name: Validate v11.62.78 golem USE, fishing and creeper-avoidance parity
        run: python3 tools/tc4_116278_golem_core_parity_guard.py

      - name: Validate v11.62.79 essentia pressure, reservoir and centrifuge parity
        run: python3 tools/tc4_116279_essentia_transport_parity_guard.py

      - name: Validate v11.62.80 taint ecology, fibres, spores and spider parity
        run: python3 tools/tc4_116280_taint_ecology_parity_guard.py

      - name: Validate v11.62.81 Warp buckets, ward migration, spawns and Death Gaze parity
        run: python3 tools/tc4_116281_warp_eldritch_parity_guard.py

      - name: Validate v11.62.82 research note and Research Table workflow parity
        run: python3 tools/tc4_116282_research_workflow_parity_guard.py

      - name: Validate retained v11.62.83 Forge compiler hotfix
        run: python3 tools/tc4_116283_forge_compile_hotfix_guard.py

      - name: Validate retained v11.62.84 Forge compiler hotfix
        run: python3 tools/tc4_116284_forge_compile_hotfix_guard.py

      - name: Validate retained v11.62.85 runtime initialization hotfix
        run: python3 tools/tc4_116285_runtime_init_hotfix_guard.py

      - name: Validate retained v11.62.86 Infusion valid-location parity
        run: python3 tools/tc4_116286_infusion_valid_location_guard.py

      - name: Validate retained v11.62.87 Wisp parity
        run: python3 tools/tc4_116287_wisp_parity_guard.py

      - name: Validate v11.62.91 Thaumic Slime parity
        run: python3 tools/tc4_116288_thaumic_slime_parity_guard.py

      - name: Validate retained v11.62.89 ServerLevelAccessor compile hotfix
        run: python3 tools/tc4_116289_server_level_accessor_compile_guard.py

      - name: Validate retained v11.62.90 Monster spawn-rules compile hotfix
        run: python3 tools/tc4_116290_monster_spawn_rules_compile_guard.py

      - name: Validate v11.62.91 Wisp FlyingMob spawn-rules compile hotfix
        run: python3 tools/tc4_116291_wisp_flying_mob_spawn_rules_compile_guard.py

      - name: Validate runtime evidence manifest template
        run: python3 tools/validate_runtime_manifest.py --manifest runtime_artifacts/runtime_test_manifest.template.json --version 11.62.91 --template

      - name: Compile objective audit tools
        run: python3 -m py_compile tools/generate_port_status_v3.py tools/validate_runtime_manifest.py tools/compare_visual_artifacts.py

      - name: Generate objective port status (pre-build)
        run: python3 tools/generate_port_status_v3.py --version 11.62.91

      - name: Build Forge JAR
        id: forge_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/ci
          chmod +x gradlew
          ./gradlew build --stacktrace --no-daemon 2>&1 | tee build/ci/gradle-build.log

      - name: Upload Forge compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-build-log-v11.62.91
          if-no-files-found: error
          path: build/ci/gradle-build.log

      - name: Fail job after preserving compiler log
        if: steps.forge_build.outcome != 'success'
        run: |
          echo "Forge Gradle build failed; compiler log was uploaded."
          exit 1

      - name: Update objective port status with built JAR SHA-256
        shell: bash
        run: |
          MAIN_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-github.jar' | head -n 1)
          test -n "$MAIN_JAR"
          python3 tools/generate_port_status_v3.py --version 11.62.91 --jar "$MAIN_JAR"

      - name: Validate committed runtime evidence when present
        shell: bash
        run: |
          if [ -f runtime_artifacts/runtime_test_manifest.json ]; then
            python3 tools/validate_runtime_manifest.py --manifest runtime_artifacts/runtime_test_manifest.json --version 11.62.91
          else
            echo "No runtime manifest committed; runtime statuses remain NOT TESTED."
          fi

      - name: Audit SRG-safe renderer and screen providers
        shell: bash
        run: |
          MAIN_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-github.jar' | head -n 1)
          test -n "$MAIN_JAR"
          python3 tools/audit_runtime_sam_bridges.py --jar "$MAIN_JAR"

      - name: Audit complete release JAR contents
        shell: bash
        run: |
          MAIN_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-github.jar' | head -n 1)
          test -n "$MAIN_JAR"
          python3 tools/audit_release_jar.py --jar "$MAIN_JAR" --version 11.62.91 --report reports/release_jar_audit_v11.62.91.json

      - name: Calculate checksums
        shell: bash
        run: |
          mkdir -p build/release
          find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' -print0 \
            | sort -z \
            | xargs -0 sha256sum > build/release/SHA256SUMS.txt
          cp reports/*11.62.91*.json build/release/
          cp TC4_PORT_STATUS_V3.md build/release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: thaumcraft-legacy-rebuild-v11.62.91
          if-no-files-found: error
          path: |
            build/libs/*.jar
            build/release/SHA256SUMS.txt
            build/release/*11.62.91*.json
            build/release/TC4_PORT_STATUS_V3.md
