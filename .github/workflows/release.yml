name: Thaumcraft Legacy Rebuild Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Validate runtime evidence manifest template
        run: python3 tools/validate_runtime_manifest.py --manifest runtime_artifacts/runtime_test_manifest.template.json --version 11.63.61 --template
      - name: Run static contracts
        run: python3 tools/run_full_static_ci_116361.py
      - name: Forge build
        id: forge_build
        continue-on-error: true
        run: set -o pipefail; ./gradlew build --stacktrace --no-daemon 2>&1 | tee gradle-build.log
      - name: Run required Forge GameTests
        if: steps.forge_build.outcome == 'success'
        run: set -o pipefail; ./gradlew runGameTestServer --stacktrace --no-daemon 2>&1 | tee gametest-server.log
      - name: Upload generated reports and compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thaumcraft-ci-artifacts
          path: |
            reports/*11.63.61*.json
            reports/*11.63.61*.md
            TC4_PORT_STATUS_V3.md
            gradle-build.log
            gametest-server.log
            build/libs/*.jar
      - name: Fail job after preserving compiler log
        if: steps.forge_build.outcome != 'success'
        run: exit 1

