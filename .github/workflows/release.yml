name: Publish GitHub release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Forge-only project
        run: python3 tools/forge_only_guard.py

      - name: Validate Java source text
        run: python3 tools/java_syntax_guard.py

      - name: Validate JSON resources
        run: python3 tools/validate_json_resources.py

      - name: Validate TC4 visual paths
        run: python3 tools/visual_parity_guard.py

      - name: Validate integrated Research Table
        run: python3 tools/research_table_guard.py

      - name: Validate Research Table opening path
        run: python3 tools/research_table_open_guard.py

      - name: Validate Magical Forest worldgen path
        run: python3 tools/worldgen_guard.py

      - name: Validate feature-cycle-safe biome generation
        run: python3 tools/feature_cycle_guard.py

      - name: Validate Thaumometer scanning path
        run: python3 tools/thaumometer_scan_guard.py

      - name: Validate screenshot-driven runtime visuals
        run: python3 tools/runtime_visual_guard.py

      - name: Validate magical leaves, wand UV and Research Table renderer
        run: python3 tools/leaves_wand_table_guard.py

      - name: Validate byte-exact original TC4 texture bank
        run: python3 tools/tc4_original_asset_guard.py

      - name: Validate TC4 runtime visual parity
        run: python3 tools/tc4_runtime_visual_guard.py

      - name: Validate v11.62.44 runtime repairs
        run: python3 tools/runtime_fix_guard.py

      - name: Audit every item model and texture chain
        run: python3 tools/tc4_item_visual_audit.py --version 11.62.44 --fail-on-missing

      - name: Validate registry and resources
        run: python3 tools/audit_registry.py --fail-on-unexpected

      - name: Build Forge JAR
        run: |
          chmod +x gradlew
          ./gradlew build --stacktrace --no-daemon

      - name: Prepare release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release/bundle
          cp build/libs/*.jar build/release/bundle/
          cp reports/REGISTRY_AUDIT_V11_62_44.md build/release/bundle/
          cp reports/registry_audit_v11.62.44.json build/release/bundle/
          cp reports/ITEM_VISUAL_AUDIT_V11_62_44.md build/release/bundle/
          cp reports/item_visual_audit_v11.62.44.json build/release/bundle/
          cp PORT_STATUS_V11_62_43.md build/release/bundle/
          cp REPORT_V11_62_44_RUNTIME_FIXES.md build/release/bundle/
          cp GITHUB_UPLOAD_V11_62_44.md build/release/bundle/
          cp STATIC_VALIDATION_V11_62_44.txt build/release/bundle/
          (
            cd build/release/bundle
            sha256sum *.jar > SHA256SUMS.txt
            zip -9 -r ../thaumcraft_legacy_rebuild_v11.62.44_RELEASE.zip .
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: REPORT_V11_62_44_RUNTIME_FIXES.md
          files: |
            build/libs/*.jar
            build/release/thaumcraft_legacy_rebuild_v11.62.44_RELEASE.zip
            build/release/bundle/SHA256SUMS.txt
            reports/REGISTRY_AUDIT_V11_62_44.md
            reports/registry_audit_v11.62.44.json
            reports/ITEM_VISUAL_AUDIT_V11_62_44.md
            reports/item_visual_audit_v11.62.44.json
            PORT_STATUS_V11_62_43.md
            GITHUB_UPLOAD_V11_62_44.md
            STATIC_VALIDATION_V11_62_44.txt
