name: Forge 1.19.2 Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-audit:
    name: Static resource audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run static resource audit
        run: python scripts/github_static_audit.py

  build:
    name: Build Forge mod
    runs-on: ubuntu-latest
    needs: static-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "7.5.1"

      - name: Show Gradle version
        run: gradle --version

      - name: Build and reobfuscate jar
        run: gradle --no-daemon clean build --stacktrace

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thaumcraft-legacy-rebuild-stage85-jars
          path: |
            build/libs/*.jar
            build/reobfJar/output.jar
          if-no-files-found: warn

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: |
            build/reports/**
            build/tmp/**
          if-no-files-found: ignore
