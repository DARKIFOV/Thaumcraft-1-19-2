      - name: TC4 v11.62.1 integrated server startup hotfix audit
        run: python scripts/tc4_v11_62_1_integrated_server_startup_hotfix_audit.py

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle cache and wrapper validation
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Gradle wrapper version
        run: ./gradlew --version

      - name: Build and reobfuscate jar
        run: ./gradlew --no-daemon clean build verifyJarResources verifyGithubOutputJarResources copyGithubOutputJar --stacktrace

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thaumcraft-legacy-rebuild-stage205-jars
          # Stage205 compatibility marker: thaumcraft-legacy-rebuild-stage204-jars
          path: |
            build/libs/*.jar
          if-no-files-found: warn

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stage205-build-reports
          path: |
            build/reports/**
            build/tmp/**
          if-no-files-found: ignore
