name: Forge 1.19.2 Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forge-1192-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Forge 1.19.2 Build
    # GitHub-hosted runner acquisition hardening:
    # previous two-job chain sometimes died before any repository step with
    # "job was not acquired by Runner of type hosted" / Internal server error.
    # Keep one pinned hosted runner and run audits before Gradle on the same job.
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Java syntax guard
        run: python scripts/java_syntax_guard.py

      - name: Run GitHub CI guard
        run: python scripts/github_ci_guard.py

      - name: Run static source/resource audit
        run: python scripts/github_static_audit.py

