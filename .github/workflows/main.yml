# v11.62.20 audit compatibility markers:
# thaumcraft-legacy-rebuild-1.19.2-v11.62.20-github-jar
# v11.62.20-build-reports
name: Forge 1.19.2 Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Forge 1.19.2 Build
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # GitHub web uploads and ZIP extraction can lose the Unix executable bit.
      # Restore it before github_ci_guard.py validates the wrapper.
      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Static source/resource audit
        run: python scripts/github_static_audit.py

      - name: Java syntax guard
        run: python scripts/java_syntax_guard.py

      - name: GitHub CI guard
        run: python scripts/github_ci_guard.py

      - name: TC4 v11.62.2 integrated-server world-load audit
        run: python scripts/tc4_v11_62_2_integrated_server_world_load_hotfix_audit.py

      - name: TC4 v11.62.3 Nitor runtime parity audit
        run: python scripts/tc4_v11_62_3_nitor_runtime_parity_audit.py

      - name: TC4 v11.62.4 Thaumonomicon markup/layout audit
        run: python scripts/tc4_v11_62_4_thaumonomicon_markup_audit.py

      - name: TC4 v11.62.5 Thaumonomicon recipe cards audit
        run: python scripts/tc4_v11_62_5_thaumonomicon_recipe_cards_audit.py

      - name: TC4 v11.62.6 Thaumonomicon tooltip/scissor audit
        run: python scripts/tc4_v11_62_6_thaumonomicon_tooltip_scissor_audit.py

      - name: TC4 v11.62.7 magic tree visual/shape audit
        run: python scripts/tc4_v11_62_7_magic_tree_visual_shape_audit.py

      - name: TC4 v11.62.8 essentia jar visual/runtime audit
        run: python scripts/tc4_v11_62_8_essentia_jar_visual_runtime_audit.py

      - name: TC4 v11.62.10 Revealing/Jar GUI parity audit
        run: python scripts/tc4_v11_62_10_revealing_jar_gui_audit.py

      - name: TC4 v11.62.11 Arcane Workbench original parity audit
        run: python scripts/tc4_v11_62_11_arcane_workbench_original_parity_audit.py

      - name: TC4 v11.62.12 wand/node tapping parity audit
        run: python scripts/tc4_v11_62_12_wand_node_tapping_parity_audit.py

      - name: TC4 v11.62.13 wand components/assembly parity audit
        run: python scripts/tc4_v11_62_13_wand_component_assembly_parity_audit.py

      - name: TC4 v11.62.14 Focal Manipulator/focus upgrade parity audit
        run: python scripts/tc4_v11_62_14_focal_manipulator_focus_upgrade_audit.py

      - name: TC4 v11.62.15 Focus Fire original parity audit
        run: python scripts/tc4_v11_62_15_focus_fire_original_parity_audit.py

      - name: TC4 v11.62.16 Focus Frost original parity audit
        run: python scripts/tc4_v11_62_16_focus_frost_original_parity_audit.py

      - name: TC4 v11.62.17 Focus Shock + Primal original parity audit
        run: python scripts/tc4_v11_62_17_focus_shock_primal_original_parity_audit.py

      - name: TC4 v11.62.18 Focus Excavation original parity audit
        run: python scripts/tc4_v11_62_18_focus_excavation_original_parity_audit.py

      - name: TC4 v11.62.19 Equal Trade + Portable Hole + Warding + counted clusters audit
        run: python scripts/tc4_v11_62_19_equal_trade_portable_hole_warding_cluster_original_parity_audit.py

      - name: TC4 v11.62.20 Nine Hells + Pech's Curse original parity audit
        run: python scripts/tc4_v11_62_20_nine_hells_pech_curse_original_parity_audit.py

      - name: TC4 v11.62.21 Golemancy core original parity audit
        run: python scripts/tc4_v11_62_21_golemancy_core_original_parity_audit.py


      - name: TC4 v11.62.22 Golemancy progression + infrastructure audit
        run: python scripts/tc4_v11_62_22_golemancy_progression_infrastructure_audit.py

      - name: TC4 v11.62.23 Essentia transport + Thaumatorium + alchemical infrastructure audit
        run: python scripts/tc4_v11_62_23_essentia_transport_thaumatorium_alchemical_infrastructure_audit.py

      - name: TC4 v11.62.24 Research Matrix + Thaumonomicon + machines audit
        run: python scripts/tc4_v11_62_24_research_matrix_thaumonomicon_deconstruction_crystalizer_advanced_furnace_audit.py

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle cache and wrapper validation
        uses: gradle/actions/setup-gradle@v4

      - name: Show Gradle wrapper version
        run: ./gradlew --version

      - name: Build and reobfuscate jar
        run: ./gradlew --no-daemon clean build verifyJarResources verifyGithubOutputJarResources copyGithubOutputJar --stacktrace

      - name: Upload playable jar only
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # v11.62.14 compatibility markers: v11.62.14-github-jar / v11.62.14-build-reports
          # v11.62.11 compatibility marker: v11.62.11-github-jar
          # v11.62.13 compatibility marker: v11.62.13-github-jar / v11.62.13-build-reports
          # v11.62.12 audit compatibility: v11.62.12-github-jar / v11.62.12-build-reports
          # v11.62.15-github-jar compatibility marker
          # v11.62.16-github-jar compatibility marker
          # v11.62.17-github-jar compatibility marker
          # v11.62.18-github-jar compatibility marker
          # v11.62.19-github-jar compatibility marker
          # thaumcraft-legacy-rebuild-1.19.2-v11.62.21-github-jar compatibility marker
          # v11.62.22-github-jar compatibility marker
          # v11.62.23-github-jar compatibility marker
          name: thaumcraft-legacy-rebuild-1.19.2-v11.62.24-github-jar
          path: |
            build/libs/*-github.jar
          if-no-files-found: warn

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          # v11.62.15-build-reports compatibility marker
          # v11.62.16-build-reports compatibility marker
          # v11.62.17-build-reports compatibility marker
          # v11.62.18-build-reports compatibility marker
          # v11.62.19-build-reports compatibility marker
          # v11.62.21-build-reports compatibility marker
          # v11.62.22-build-reports compatibility marker
          # v11.62.23-build-reports compatibility marker
          name: v11.62.24-build-reports
          path: |
            build/reports/**
            build/tmp/**
          if-no-files-found: ignore
