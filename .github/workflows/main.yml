name: Forge 1.19.2 Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forge-1192-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-audit:
    name: Static source/resource audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Java syntax guard
        run: python scripts/java_syntax_guard.py

      - name: Run GitHub CI guard
        run: python scripts/github_ci_guard.py

      - name: Run static resource audit
        run: python scripts/github_static_audit.py

      - name: Run Stage138 arcane pattern audit
        run: python scripts/tc4_stage138_arcane_pattern_audit.py

      - name: Run Stage139 whole port sweep audit
        run: python scripts/tc4_stage139_whole_port_sweep_audit.py

      - name: Run Stage140 golemancy checkpoint audit
        run: python scripts/tc4_stage140_golemancy_checkpoint_audit.py

      - name: Run Stage141 golemancy controls audit
        run: python scripts/tc4_stage141_golemancy_controls_audit.py

      - name: Run Stage142 golemancy GUI/render audit
        run: python scripts/tc4_stage142_golemancy_gui_render_audit.py

      - name: Run Stage143 golemancy whole sweep audit
        run: python scripts/tc4_stage143_golemancy_whole_sweep_audit.py

      - name: Run Stage144 eldritch/warp/taint audit
        run: python scripts/tc4_stage144_eldritch_warp_taint_audit.py

      - name: Run TC4 book/table/workbench audit
        run: python scripts/tc4_book_table_workbench_audit.py

  build:
    name: Build Forge mod jar
    runs-on: ubuntu-latest
    needs: static-audit
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle cache and wrapper validation
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Gradle wrapper version
        run: ./gradlew --version

      - name: Build and reobfuscate jar
        run: ./gradlew --no-daemon clean build --stacktrace

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thaumcraft-legacy-rebuild-stage144-jars
          path: |
            build/libs/*.jar
            build/reobfJar/output.jar
          if-no-files-found: warn

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stage144-build-reports
          path: |
            build/reports/**
            build/tmp/**
          if-no-files-found: ignore
