def verifyJarResourceEntries = { File jarFile ->
    if (!jarFile.exists()) {
        throw new GradleException("Missing jar to verify: ${jarFile}")
    }
    def zip = new java.util.zip.ZipFile(jarFile)
    try {
        requiredJarResourceEntries.each { entry ->
            if (zip.getEntry(entry) == null) {
                throw new GradleException("Built jar is missing required resource: ${entry}")
            }
        }
    } finally {
        zip.close()
    }
}

tasks.register('verifyJarResources') {
    dependsOn 'jar'
    doLast {
        verifyJarResourceEntries(jar.archiveFile.get().asFile)
    }
}

tasks.register('verifyGithubOutputJarResources') {
    dependsOn 'reobfJar'
    doLast {
        verifyJarResourceEntries(file("${buildDir}/reobfJar/output.jar"))
    }
}

tasks.register('copyGithubOutputJar', Copy) {
    dependsOn 'verifyGithubOutputJarResources'
    from("${buildDir}/reobfJar/output.jar")
    into("${buildDir}/libs")
    rename { String fileName -> "thaumcraft_legacy_rebuild_1.19.2-${project.version}-github.jar" }
}

tasks.named('build') {
    dependsOn 'verifyJarResources'
    dependsOn 'copyGithubOutputJar'
}

// reobfJar is already reached through copyGithubOutputJar. Avoid a finalizer
// cycle (jar -> reobfJar -> jar) that can overflow Gradle's execution graph
// while reporting an unrelated compile failure.

